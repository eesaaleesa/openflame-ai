<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#ffffff" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Content Review — OpenFlame AI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --ink-soft: #6b635c;
    --paper: #fbf9f6;
    --card: #ffffff;
    --line: #ece7e1;
    --ember: #e8651f;
    --ember-deep: #c4521a;
    --linkedin: #0a66c2;
    --green: #2f8f4e;
    --shadow: 0 1px 2px rgba(26,23,20,.04), 0 8px 24px rgba(26,23,20,.06);
    --bg: #1e2b33;
    --on-bg: #f1f4f5;
    --on-bg-soft: rgba(255,255,255,.66);
  }

  /* Nav — matches the portal exactly */
  nav { display:flex; align-items:center; justify-content:space-between; padding:8px 22px; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:100; }
  .nav-logo { font-family:"Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight:800; font-size:20px; line-height:1.55; color:var(--ink); display:flex; align-items:center; gap:.45rem; text-decoration:none; }
  .nav-logo img { height:26px; width:auto; }
  .nav-logo .flame { color:var(--ember); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background:#fff; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg);
    background-image: repeating-linear-gradient(-45deg,rgba(255,255,255,0.02) 0px,rgba(255,255,255,0.02) 1px,transparent 1px,transparent 12px);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 20px 160px; }

  /* Banner */
  .banner-wrap {
    max-width: 760px; margin: 0 auto; padding: 24px 20px 0;
  }
  .banner {
    width: 100%; display: block; border-radius: 14px;
    box-shadow: var(--shadow); border: 1px solid var(--line);
  }

  /* Header */
  header {
    padding: 32px 0 28px;
    border-bottom: 2px solid rgba(255,255,255,.18);
    margin-bottom: 8px;
  }
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--ember);
    margin-bottom: 10px;
  }
  h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; color: var(--on-bg); }
  .sub { margin-top: 8px; font-size: 15px; color: var(--on-bg-soft); }
  .status-pill {
    display: inline-block; margin-top: 16px; padding: 5px 12px;
    font-size: 12px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
    border-radius: 100px; background: #fff3e9; color: var(--ember-deep);
    border: 1px solid #f6d9c4;
  }
  .status-pill.approved { background:#e4f3ea; color:#1f7a4d; border:1px solid #bfe3cd; }
  .status-pill.published { background:#e7f0fb; color:#2b6cb0; border:1px solid #c5dbf3; }

  /* Footer */
  .pagefoot {
    text-align: center; padding: 40px 20px 0; margin-top: 20px;
    border-top: 1px solid rgba(255,255,255,.12); color: var(--on-bg-soft); font-size: 13px;
  }
  .pagefoot strong { color: var(--ember); }

  /* Section label */
  .section-label {
    display: flex; align-items: center; gap: 10px; margin: 44px 0 18px;
  }
  .section-label .sl-ic { width: 28px; height: 28px; border-radius: 8px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .section-label .sl-ic.ic-social { background: rgba(232,101,31,.18); color: #ffb87a; }
  .section-label .sl-ic.ic-li { background: rgba(10,102,194,.24); color: #7fb6f0; }
  .section-label .sl-ic.ic-mail { background: rgba(255,255,255,.10); color: var(--on-bg-soft); }
  .section-label .sl-tx { font-size: 13px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--on-bg); }
  .section-label .sl-count { font-size: 11px; font-weight: 700; color: var(--on-bg-soft); background: rgba(255,255,255,.09); border-radius: 999px; padding: 2px 8px; }
  .section-label .sl-line { flex: 1; height: 1px; background: rgba(255,255,255,.12); }

  /* Week overview chips */
  .overview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .ov-chip { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; color: var(--on-bg); background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.10); border-radius: 999px; padding: 5px 12px; }
  .ov-chip .ov-dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 auto; }

  /* Post card */
  .post {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; overflow: hidden; margin-bottom: 18px;
    box-shadow: var(--shadow); transition: transform .16s ease, box-shadow .16s ease;
  }
  @media (hover:hover){ .post:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(26,23,20,.16); } }
  .post-photo { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #f0ece7; }
  .post-body { padding: 16px 20px 20px; }
  .post-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 11px; }
  .post-day {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--ember); margin: 0;
  }
  .post.li .post-day { color: var(--linkedin); }
  .chips { display: flex; gap: 6px; flex: 0 0 auto; }
  .chip { display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 700; letter-spacing: .02em; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .chip-ig { background: rgba(193,53,132,.12); color: #c13584; }
  .chip-fb { background: rgba(24,119,242,.12); color: #1877f2; }
  .chip-li { background: rgba(10,102,194,.12); color: #0a66c2; }
  .post-text { font-size: 15px; white-space: pre-wrap; }
  .hashtags { margin-top: 11px; font-size: 13.5px; color: #3d4f5c; font-weight: 500; line-height: 1.5; }
  .post.li .hashtags { color: var(--linkedin); }

  /* LinkedIn variant */
  .post.li .post-day { color: var(--linkedin); }
  .li-badge {
    display: inline-block; width: 18px; height: 18px; border-radius: 3px;
    background: var(--linkedin); color: #fff; font-size: 11px; font-weight: 700;
    text-align: center; line-height: 18px; margin-right: 6px; vertical-align: -3px;
  }

  /* Email preview — mirrors the real Kit email */
  .email-preview-frame {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; overflow: hidden; margin-bottom: 18px;
    box-shadow: var(--shadow);
  }
  .email-meta {
    padding: 14px 18px; border-bottom: 1px solid var(--line); background: #faf8f5;
  }
  .email-meta .kind { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-soft); }
  .email-meta .subject { font-size: 16px; font-weight: 700; margin-top: 4px; }
  .email-meta .preview { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
  .email-render {
    padding: 20px 12px;
  }
  .email-inner {
    max-width: 600px; margin: 0 auto; background: #fff;
    border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .email-inner .e-banner { width: 100%; display: block; border: 0; }
  .e-eyebrow { padding: 30px 36px 6px; text-align: center; }
  .e-eyebrow .biz { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
  .e-eyebrow .rule { width: 40px; height: 2px; margin: 14px auto 0; }
  .e-body { padding: 20px 36px 8px; }
  .e-body p { margin: 0 0 16px; font-size: 15px; line-height: 1.7; }
  .e-cta { padding: 6px 36px 32px; text-align: center; }
  .e-cta a {
    display: inline-block; padding: 13px 32px; text-decoration: none;
    color: #fff; font-weight: 600; font-size: 13px; text-transform: uppercase;
    letter-spacing: 1px; border-radius: 6px;
  }
  .e-foot { padding: 26px 36px; text-align: center; }
  .e-foot .fbiz { font-family: Georgia, serif; font-size: 17px; letter-spacing: 1px; margin: 0 0 6px; }
  .e-foot .floc { font-size: 13px; opacity: .8; margin: 0; }
  .e-foot .flinks { margin: 12px 0 0; font-size: 13px; }
  .e-foot .flinks a { text-decoration: none; margin: 0 7px; opacity: .9; }
  .e-foot .funsub { margin: 12px 0 0; font-size: 12px; opacity: .6; }

  /* Action bar */
  .actions {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(30,43,51,.94); backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,.08); padding: 16px 20px;
    box-shadow: 0 -4px 20px rgba(26,23,20,.06);
  }
  .actions-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 12px; }
  button {
    flex: 1; font-family: inherit; font-size: 15px; font-weight: 700;
    padding: 15px 20px; border-radius: 11px; cursor: pointer; border: none;
    transition: transform .08s ease, opacity .15s ease;
  }
  button:active { transform: translateY(1px); }
  .btn-approve { background: var(--ember); color: #fff; }
  .btn-approve:hover { background: var(--ember-deep); }
  .btn-changes { background: transparent; color: var(--on-bg); border: 1.5px solid rgba(255,255,255,.22); }
  .btn-changes:hover { border-color: rgba(255,255,255,.4); }

  /* Changes panel */
  .changes-panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 22px 24px; margin: 24px 0; box-shadow: var(--shadow); display: none;
  }
  .changes-panel.open { display: block; }
  .changes-panel label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  textarea {
    width: 100%; min-height: 120px; font-family: inherit; font-size: 15px;
    padding: 14px; border: 1.5px solid var(--line); border-radius: 10px; resize: vertical;
    line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--ember); }

  /* States */
  .state { text-align: center; padding: 100px 20px; color: var(--on-bg-soft); }
  .state h2 { font-size: 22px; color: var(--on-bg); margin-bottom: 10px; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid rgba(255,255,255,.2); border-top-color: var(--ember);
    border-radius: 50%; margin: 0 auto 20px; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .done-icon { font-size: 48px; margin-bottom: 16px; }

  @media (max-width: 480px) {
    h1 { font-size: 25px; }
    .wrap { padding: 0 16px 150px; }
  }
</style>
</head>

<script>
const WEBHOOK_FETCH = "https://n8n.openflame-ai.com/webhook/approval-content";
const WEBHOOK_DECISION = "https://n8n.openflame-ai.com/webhook/approval-decision";
const BANNER = "https://openflame-ai.com/clients/openflame-ai/openflame-ai_email-banner.jpg?v=2";

const params = new URLSearchParams(location.search);
const contentId = params.get("id");
const token = params.get("t");
const app = document.getElementById("app");

function bannerHTML(){ return `<div class="banner-wrap"><img class="banner" src="${BANNER}" alt="OpenFlame AI"></div>`; }
function stateScreen(inner){ return `${bannerHTML()}<div class="wrap"><div class="state">${inner}</div></div>`; }

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// Split caption into body + trailing hashtag line, strip trailing ---
function splitCaption(text){
  let t = String(text||"").replace(/\n*---\s*$/,"").trim();
  const lines = t.split("\n");
  let tagLine = "";
  for (let i = lines.length-1; i >= 0; i--){
    if (lines[i].trim().startsWith("#")){ tagLine = lines[i].trim(); lines.splice(i,1); }
    else if (lines[i].trim() === "") { continue; }
    else break;
  }
  return { body: lines.join("\n").trim(), tags: tagLine };
}

function parseEmail(raw){
  let t = String(raw||"").replace(/\n*---\s*$/,"").trim();
  const subjM = t.match(/SUBJECT LINE:\s*(.+)/i);
  const prevM = t.match(/PREVIEW TEXT:\s*(.+)/i);
  const subject = subjM ? subjM[1].trim() : "";
  const preview = prevM ? prevM[1].trim() : "";
  let body = t.replace(/SUBJECT LINE:.*\n?/i,"").replace(/PREVIEW TEXT:.*\n?/i,"").trim();
  return { subject, preview, body };
}

// Convert email body markdown to HTML the same way the Kit template does
function emailBodyHtml(body, primary, textColor){
  let b = String(body||"")
    .replace(/^-{3,}\s*$/gm,"")
    .replace(/\\n/g,"\n")
    .trim();
  // escape, then re-apply formatting
  b = b.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  b = b.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
       .replace(/\[([^\]]+)\]\(([^)]+)\)/g, `<a href="$2" style="color:${primary};font-weight:600;">$1</a>`)
       .replace(/\[([^\]]+)\]/g, (m,label)=>label.replace(/^→\s*/,"").replace(/\s*→$/,"").trim());
  return b.split(/\n\n+/).map(p=>p.trim()).filter(Boolean)
    .map(p=>`<p style="color:${textColor};">${p.replace(/\n/g,"<br>")}</p>`).join("");
}

// Build the full Kit-style email preview
function renderEmail(d, raw, kindLabel){
  const e = parseEmail(raw);
  const primary = d.emailPrimary || "#5C8B83";
  const accent  = d.emailAccent  || "#E89B3C";
  const bg      = d.emailBg      || "#F5EDDE";
  const text    = d.emailText    || "#1F1F1F";
  const banner  = d.bannerUrl || "";
  const cta     = d.bookingUrl || "";
  const ctaLabel= d.ctaLabel || "Learn More";

  const socials = [];
  if (d.websiteUrl)  socials.push(`<a href="${esc(d.websiteUrl)}" style="color:${bg};">Website</a>`);
  if (d.instagramUrl)socials.push(`<a href="${esc(d.instagramUrl)}" style="color:${bg};">Instagram</a>`);
  if (d.facebookUrl) socials.push(`<a href="${esc(d.facebookUrl)}" style="color:${bg};">Facebook</a>`);

  return `
  <div class="email-preview-frame">
    <div class="email-meta">
      <div class="kind">${esc(kindLabel)}</div>
      <div class="subject">${esc(e.subject)}</div>
      ${e.preview?`<div class="preview">${esc(e.preview)}</div>`:""}
    </div>
    <div class="email-render" style="background:${bg};">
      <div class="email-inner">
        ${banner?`<img class="e-banner" src="${esc(banner)}" alt="${esc(d.businessName)}">`:""}
        <div class="e-eyebrow">
          <div class="biz" style="color:${primary};">${esc(d.businessName)}</div>
          <div class="rule" style="background:${accent};"></div>
        </div>
        <div class="e-body">${emailBodyHtml(e.body, primary, text)}</div>
        ${cta?`<div class="e-cta"><a href="${esc(cta)}" style="background:${accent};">${esc(ctaLabel)}</a></div>`:""}
        <div class="e-foot" style="background:${text};color:${bg};">
          <p class="fbiz" style="color:${bg};">${esc(d.businessName)}</p>
          ${d.locationDisplay?`<p class="floc" style="color:${bg};">${esc(d.locationDisplay)}</p>`:""}
          ${socials.length?`<p class="flinks">${socials.join(" · ")}</p>`:""}
          <p class="funsub" style="color:${bg};">You're receiving this because you signed up for updates from ${esc(d.businessName)}.</p>
        </div>
      </div>
    </div>
  </div>`;
}

function sectionIcon(kind){
  if(kind==='social') return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/><circle cx="17.3" cy="6.7" r="1.2" fill="currentColor"/></svg>';
  if(kind==='li') return '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6.94 7.5a1.94 1.94 0 11-.01-3.88 1.94 1.94 0 01.01 3.88zM5.3 9h3.3v9.7H5.3V9zm5.1 0h3.16v1.33h.05c.44-.83 1.5-1.7 3.1-1.7 3.3 0 3.9 2.17 3.9 5V18.7h-3.3v-4.5c0-1.07-.02-2.45-1.5-2.45-1.5 0-1.73 1.17-1.73 2.37v4.58h-3.3V9z"/></svg>';
  return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function sectionLabel(kind, text, count){
  const cls = kind==='social'?'ic-social':(kind==='li'?'ic-li':'ic-mail');
  const cnt = (count!=null)?`<span class="sl-count">${count}</span>`:'';
  return `<div class="section-label"><span class="sl-ic ${cls}">${sectionIcon(kind)}</span><span class="sl-tx">${esc(text)}</span>${cnt}<span class="sl-line"></span></div>`;
}

function render(d){
  const status = String(d.status||'').toLowerCase();
  const isPending = (status === 'pending' || status === '');
  let pillCls='', pillTxt='Awaiting your approval';
  if(status==='approved'){ pillCls=' approved'; pillTxt='Approved'; }
  else if(status==='published'){ pillCls=' published'; pillTxt='Published & scheduled'; }

  const caps = Array.isArray(d.captions)?d.captions:[];
  const liPosts = Array.isArray(d.linkedinPosts)?d.linkedinPosts:[];
  const hasNews = !!d.newsletter, hasPromo = !!d.promo;
  const ov = [];
  if(caps.length) ov.push(`<span class="ov-chip"><span class="ov-dot" style="background:var(--ember)"></span>${caps.length} Social</span>`);
  if(liPosts.length) ov.push(`<span class="ov-chip"><span class="ov-dot" style="background:var(--linkedin)"></span>${liPosts.length} LinkedIn</span>`);
  if(hasNews) ov.push(`<span class="ov-chip"><span class="ov-dot" style="background:#7fb6f0"></span>Newsletter</span>`);
  if(hasPromo) ov.push(`<span class="ov-chip"><span class="ov-dot" style="background:#ffb87a"></span>Promo</span>`);

  let html = `
    <div class="banner-wrap">
      <img class="banner" src="https://openflame-ai.com/clients/openflame-ai/openflame-ai_email-banner.jpg?v=2" alt="OpenFlame AI">
    </div>
    <div class="wrap">
    <header>
      <div class="eyebrow">Content Review</div>
      <h1>${esc(d.businessName)}</h1>
      <div class="sub">Week of ${esc(d.weekDate)}${d.revisionNumber>1?` · Revision ${d.revisionNumber}`:""}</div>
      <div class="status-pill${pillCls}">${pillTxt}</div>
      ${ov.length?`<div class="overview">${ov.join('')}</div>`:''}
    </header>`;

  // Revision request (revisions only)
  if (d.isRevision && d.changeNotes){
    html += `
    <div style="margin:18px 0;padding:16px 18px;border-left:4px solid #e8640c;background:#fff6ef;border-radius:8px;">
      <div style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#e8640c;margin-bottom:6px;">Your Revision Request</div>
      <div style="color:#3d4f5c;line-height:1.5;white-space:pre-wrap;">${esc(d.changeNotes)}</div>
      <div style="margin-top:10px;font-size:13px;color:#6b7280;">The content below has been revised based on this request. Review and approve to publish, or request further changes.</div>
    </div>`;
  }

  // Social posts
  if (caps.length){
    html += sectionLabel('social', 'Social Posts', caps.length);
    caps.forEach((c, ci) => {
      const {body, tags} = splitCaption(c.text);
      const capDay = c.day || ['Monday','Tuesday','Wednesday','Thursday','Friday'][ci] || ('Post ' + (ci + 1));
      html += `<div class="post">`;
      if (c.photo && c.photo.url) html += `<img class="post-photo" src="${esc(c.photo.url)}" alt="${esc(capDay)} post">`;
      html += `<div class="post-body">
        <div class="post-head"><p class="post-day">${esc(capDay)}</p><div class="chips"><span class="chip chip-ig">Instagram</span><span class="chip chip-fb">Facebook</span></div></div>
        <div class="post-text">${esc(body)}</div>
        ${tags?`<div class="hashtags">${esc(tags)}</div>`:""}
      </div></div>`;
    });
  }

  // LinkedIn
  if (liPosts.length){
    html += sectionLabel('li', 'LinkedIn Posts', liPosts.length);
    liPosts.forEach((p,i) => {
      const {body, tags} = splitCaption(p.text);
      const liDay = ['Monday','Wednesday','Friday'][i] || ('Post '+(i+1));
      html += `<div class="post li">`;
      if (p.media && p.media.url) html += `<img class="post-photo" src="${esc(p.media.url)}" alt="LinkedIn post ${i+1}">`;
      html += `<div class="post-body">
        <div class="post-head"><p class="post-day">${esc(liDay)}</p><div class="chips"><span class="chip chip-li">LinkedIn</span></div></div>
        <div class="post-text">${esc(body)}</div>
        ${tags?`<div class="hashtags">${esc(tags)}</div>`:""}
      </div></div>`;
    });
  }

  // Emails
  if (d.newsletter){
    html += sectionLabel('mail', 'Weekly Newsletter', null);
    html += renderEmail(d, d.newsletter, "Email · Newsletter");
  }
  if (d.promo){
    html += sectionLabel('mail', 'Promotional Email', null);
    html += renderEmail(d, d.promo, "Email · Promotion");
  }

  // Changes panel (only while pending)
  if(isPending){
    html += `
    <div class="changes-panel" id="changesPanel">
      <label for="notes">What would you like changed?</label>
      <textarea id="notes" placeholder="e.g. Change Monday's photo to something brighter, and make the newsletter subject line shorter."></textarea>
    </div>`;
  }

  // Footer + close wrap
  html += `
    <div class="pagefoot">Prepared for you by <strong>OpenFlame AI</strong></div>
    </div>`;

  // Action bar (only while pending)
  if(isPending){
    html += `
    <div class="actions">
      <div class="actions-inner">
        <button class="btn-changes" id="btnChanges">Request Changes</button>
        <button class="btn-approve" id="btnApprove">Approve &amp; Publish</button>
      </div>
    </div>`;
  }

  app.innerHTML = html;
  if(isPending) wireActions(d);
}

function wireActions(d){
  const panel = document.getElementById("changesPanel");
  const btnChanges = document.getElementById("btnChanges");
  const btnApprove = document.getElementById("btnApprove");
  let panelOpen = false;

  btnChanges.onclick = () => {
    if (!panelOpen){
      panel.classList.add("open");
      panel.scrollIntoView({behavior:"smooth", block:"center"});
      btnChanges.textContent = "Submit Change Request";
      panelOpen = true;
    } else {
      const notes = document.getElementById("notes").value.trim();
      if (!notes){ document.getElementById("notes").focus(); return; }
      submit(d, "changes", notes);
    }
  };
  btnApprove.onclick = () => submit(d, "approve", "");
}

async function submit(d, decision, notes){
  app.innerHTML = stateScreen(`<div class="spinner"></div><p>${decision==="approve"?"Publishing your content…":"Sending your change request…"}</p>`);
  try {
    const res = await fetch(WEBHOOK_DECISION, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ contentId: d.contentId, clientId: d.clientId, decision, notes, token })
    });
    if (!res.ok) throw new Error("bad response");
    showDone(decision);
  } catch(e){
    app.innerHTML = stateScreen(`<div class="done-icon">⚠️</div><h2>Something went wrong</h2><p>We couldn't process that just now. Please try again, or reply to your approval email directly.</p>`);
  }
}

function showDone(decision){
  if (decision === "approve"){
    app.innerHTML = stateScreen(`<div class="done-icon">✓</div><h2>Approved</h2><p>Your content is scheduled to publish. We'll take it from here.</p>`);
  } else {
    app.innerHTML = stateScreen(`<div class="done-icon">✎</div><h2>Change request received</h2><p>We're on it — you'll get an updated version to review shortly.</p>`);
  }
}

// Boot
if (!contentId){
  app.innerHTML = stateScreen(`<div class="done-icon">🔗</div><h2>Missing link</h2><p>This page needs a valid content link. Please use the link from your approval email.</p>`);
} else {
  app.innerHTML = stateScreen(`<div class="spinner"></div><p>Loading your content…</p>`);
  fetch(`${WEBHOOK_FETCH}?id=${encodeURIComponent(contentId)}&t=${encodeURIComponent(token||'')}`)
    .then(r => r.json())
    .then(d => {
      if (!d || d.error || d.ok === false){
        app.innerHTML = stateScreen(`<div class="done-icon">🔍</div><h2>Content not found</h2><p>We couldn't find content for this link. It may have expired or already been approved.</p>`);
        return;
      }
      render(d);
    })
    .catch(() => {
      app.innerHTML = stateScreen(`<div class="done-icon">⚠️</div><h2>Couldn't load</h2><p>There was a problem loading your content. Please try again in a moment.</p>`);
    });
}
</script>
